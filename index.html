<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Steinke</title>
<style>
  @import url('https://cdnjs.cloudflare.com/ajax/libs/Iosevka/11.1.1/iosevka/iosevka.min.css');

  :root {
    --base03:  #002b36;
    --base02:  #073642;
    --base01:  #586e75;
    --base00:  #657b83;
    --base0:   #839496;
    --base1:   #93a1a1;
    --base2:   #eee8d5;
    --base3:   #fdf6e3;
    --yellow:  #b58900;
    --orange:  #cb4b16;
    --red:     #dc322f;
    --magenta: #d33682;
    --violet:  #6c71c4;
    --blue:    #268bd2;
    --cyan:    #2aa198;
    --green:   #859900;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Iosevka Web', monospace;
    background: var(--base3);
    color: var(--base00);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .page {
    max-width: 480px;
    width: 100%;
  }

  .panel {
    position: relative;
    padding: 1rem 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--base1);
  }

  .panel-label {
    position: absolute;
    top: -0.65em;
    left: 1rem;
    background: var(--base3);
    padding: 0 0.4rem;
    color: var(--cyan);
    font-size: 0.85rem;
  }

  .about-inner {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .avatar {
    border: 1px solid var(--base1);
  }

  .about-text h1 {
    font-size: 1rem;
    font-weight: normal;
    color: var(--base01);
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--base00);
  }

  .row {
    display: grid;
    grid-template-columns: 7ch auto 1fr;
    gap: 0 0.5ch;
    align-items: baseline;
    padding: 0.3rem 0;
  }

  .label {
    color: var(--base01);
  }

  .sep {
    color: var(--base1);
    text-align: center;
    padding-left: 1.2ch;
    padding-right: 0.3ch;
  }

  a {
    color: var(--blue);
    text-decoration: none;
  }

  a:hover {
    color: var(--cyan);
  }

  footer {
    margin-top: 1rem;
    font-size: 0.8rem;
    text-align: center;
    color: var(--base1);
  }

  .pgp-fingerprint {
    font-size: 0.77rem;
    word-spacing: 0.3em;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --base01:  #93a1a1;
      --base00:  #839496;
      --base0:   #657b83;
      --base1:   #586e75;
      --base2:   #073642;
      --base3:   #002b36;
    }
  }

  @media (max-width: 480px) {
    body { padding: 1rem; }
    .row { grid-template-columns: 1fr; }
    .sep { display: none; }
  }
</style>
</head>
<body>
  <div class="page">

    <div class="panel">
      <span class="panel-label">about</span>
      <div class="about-inner">
        <img class="avatar" src="https://seccdn.libravatar.org/avatar/25d243307f257322cc7fe8afbf3aeadf?s=80" alt="avatar" width="80" height="80">
        <div class="about-text">
          <h1>Jordan Steinke</h1>
	  <div class="tagline">Omaha, NE, USA</div>
        </div>
      </div>
      <div style="margin-top: 0.75rem; font-style: italic; color: var(--base01);">
        "Information wants to be free"
      </div>
    </div>

    <div class="panel">
      <span class="panel-label">contact</span>
      <div class="row">
        <span class="label">discord</span>
        <span class="sep">//</span>
        <a href="https://discord.com/users/1459744783756038412">jordansteinke</a>
      </div>
      <div class="row">
        <span class="label">email</span>
        <span class="sep">//</span>
        <a href="mailto:jordan&#64;steinke.foo">jordan&#64;steinke.foo</a>
      </div>
      <div class="row">
        <span class="label">pgp</span>
        <span class="sep">//</span>
        <a class="pgp-fingerprint" href="https://keys.openpgp.org/search?q=2B2C 6F83 77BE 5DCE D3FE  206D 1F3E E284 F51E 5D92">2B2C 6F83 77BE 5DCE D3FE  206D 1F3E E284 F51E 5D92</a>
      </div>
      <div class="row">
        <span class="label">x</span>
        <span class="sep">//</span>
        <a href="https://x.com/jordanasteinke">jordanasteinke</a>
      </div>
    </div>

    <footer>
      <a href="LICENSE">zlib license</a> &copy; 2026 Jordan Steinke // <a href="privacy.html">privacy</a>
    </footer>

  </div>
</body>
</html>
